// ============================================================
//  Audio - tiny Web Audio API helpers (no external deps)
// ============================================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  return audioCtx;
}
function beep({ freq = 440, dur = 0.08, type = 'square', vol = 0.08, slide = 0 } = {}) {
  const ctx = getAudio();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  if (slide) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq + slide), ctx.currentTime + dur);
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + dur);
}
function sfx(name) {
  switch (name) {
    case 'fix':     beep({ freq: 660, dur: 0.1, type: 'square', slide: 440, vol: 0.1 });
                    setTimeout(() => beep({ freq: 880, dur: 0.08, type: 'square', vol: 0.08 }), 60); break;
    case 'hit':     beep({ freq: 200, dur: 0.05, type: 'square', slide: -80, vol: 0.07 }); break;
    case 'spawn':   beep({ freq: 120, dur: 0.12, type: 'sawtooth', slide: 60, vol: 0.05 }); break;
    case 'tool':    beep({ freq: 500, dur: 0.04, type: 'triangle', vol: 0.06 }); break;
    case 'crash':   beep({ freq: 300, dur: 0.3, type: 'sawtooth', slide: -280, vol: 0.15 });
                    setTimeout(() => beep({ freq: 80, dur: 0.8, type: 'sawtooth', slide: -60, vol: 0.2 }), 150); break;
    case 'combo':   beep({ freq: 800, dur: 0.08, type: 'square', vol: 0.1 });
                    setTimeout(() => beep({ freq: 1000, dur: 0.08, type: 'square', vol: 0.1 }), 80);
                    setTimeout(() => beep({ freq: 1200, dur: 0.12, type: 'square', vol: 0.1 }), 160); break;
    case 'wave':    beep({ freq: 300, dur: 0.1, type: 'triangle', vol: 0.08 });
                    setTimeout(() => beep({ freq: 500, dur: 0.15, type: 'triangle', vol: 0.08 }), 100); break;
    case 'vacuum':  beep({ freq: 180, dur: 0.05, type: 'sawtooth', vol: 0.04 }); break;
  }
}

  const [elapsed, setElapsed] = useState(0);       // seconds
  const [wave, setWave] = useState(1);
  const [tool, setTool] = useState('tape');
  const [bugs, setBugs] = useState([]);            // active bugs
  const [flashes, setFlashes] = useState([]);      // floating score popups
  const [confetti, setConfetti] = useState([]);
  const [comboText, setComboText] = useState('');
  const comboRef = useRef({ count: 0, lastFix: 0 });

  const pageRef = useRef(null);
  const bugIdRef = useRef(1);
  const gameTickRef = useRef(null);
  const spawnTickRef = useRef(null);
  const waveRef = useRef(1);
  const startTimeRef = useRef(0);
  const draggingRef = useRef(null);

  // Apply cursor class to body based on current tool
  useEffect(() => {
    document.body.classList.remove('tool-tape', 'tool-debugger', 'tool-vacuum');
    if (screen === 'playing') {
      document.body.classList.add(`tool-${tool}`);
      document.body.classList.add('gaming');
    } else {
      document.body.classList.remove('gaming');
    }
  }, [tool, screen]);

  // Keyboard controls
  useEffect(() => {
    const handler = (e) => {
      if (screen !== 'playing') return;
      if (e.key === '1') { setTool('tape');     sfx('tool'); }
      if (e.key === '2') { setTool('debugger'); sfx('tool'); }
      if (e.key === '3') { setTool('vacuum');   sfx('tool'); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [screen]);

  // =====================================================
  //  Bug spawner
  // =====================================================
  const pickRandomTarget = useCallback(() => {
    const page = pageRef.current;
    if (!page) return null;
    const candidates = page.querySelectorAll('[data-bug-candidate="true"]');
    const healthy = Array.from(candidates).filter((el) => !el.dataset.bugActive);
    if (healthy.length === 0) return null;
    return healthy[Math.floor(Math.random() * healthy.length)];
  }, []);

  const spawnBug = useCallback(() => {
    const w = waveRef.current;
    // Decide type — higher waves increase variety
    let type;
    const r = Math.random();
    if (r < 0.45) {
      type = CSS_BUG_VARIANTS[Math.floor(Math.random() * CSS_BUG_VARIANTS.length)];
    } else if (r < 0.75) {
      type = 'CONSOLE';
    } else {
      type = 'LEAK';
    }

    const id = bugIdRef.current++;

    if (type === 'CONSOLE') {
      const x = 40 + Math.random() * (window.innerWidth - 460);
      const y = 80 + Math.random() * (window.innerHeight - 260);
      const hp = w >= 3 ? 2 : 1;  // higher waves make popups tougher
      setBugs((b) => [...b, {
        id, type, x, y, hp, maxHp: hp,
        message: ERROR_MESSAGES[Math.floor(Math.random() * ERROR_MESSAGES.length)],
        rot: (Math.random() - 0.5) * 8,
      }]);
    } else if (type === 'LEAK') {
      const x = 20 + Math.random() * (window.innerWidth - 160);
      const y = 100 + Math.random() * (window.innerHeight - 200);
      const text = GARBAGE_CHARS[Math.floor(Math.random() * GARBAGE_CHARS.length)];
      setBugs((b) => [...b, { id, type, x, y, text, hp: 1 }]);
    } else {
      // CSS drift-style bug attached to a DOM element
      const target = pickRandomTarget();
      if (!target) return;
      target.dataset.bugActive = String(id);
      const rect = target.getBoundingClientRect();
      const originalTransform = target.style.transform || '';
      const dx = (Math.random() - 0.5) * 200;
      const dy = (Math.random() - 0.5) * 120;
      const rot = (Math.random() - 0.5) * 20;
      if (type === 'DRIFT') {
        target.style.setProperty('--dx', `${dx}px`);
        target.style.setProperty('--dy', `${dy}px`);
        target.style.setProperty('--r', `${rot}deg`);
        target.classList.add('bug-drift');
      } else if (type === 'COMIC') {
        target.classList.add('bug-comic');
      } else if (type === 'INVERT') {
        target.classList.add('bug-invert');
      } else if (type === 'CHROMATIC') {
        target.classList.add('bug-chromatic');
      }
      setBugs((b) => [...b, {
        id, type,
        anchor: { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 },
        originalTransform,
      }]);
    }
    sfx('spawn');
  }, [pickRandomTarget]);

  // =====================================================
  //  Bug removal + scoring
  // =====================================================
  const flashScore = (x, y, amount, color = '#22c55e') => {
    const id = Math.random();
    setFlashes((f) => [...f, { id, x, y, amount, color }]);
    setTimeout(() => setFlashes((f) => f.filter((fl) => fl.id !== id)), 800);
  };

  const burstConfetti = (x, y) => {
    const pieces = [];
    const colors = ['#fde047', '#06b6d4', '#a78bfa', '#f472b6', '#22c55e'];
    for (let i = 0; i < 10; i++) {
      pieces.push({
        id: Math.random(),
        x, y,
        fx: (Math.random() - 0.5) * 160,
        fy: -20 - Math.random() * 80,
        color: colors[Math.floor(Math.random() * colors.length)],
      });
    }
    setConfetti((c) => [...c, ...pieces]);
    const ids = pieces.map(p => p.id);
    setTimeout(() => setConfetti((c) => c.filter((p) => !ids.includes(p.id))), 900);
  };

  const removeBug = useCallback((id, bx, by) => {
    setBugs((curr) => {
      const bug = curr.find((b) => b.id === id);
      if (!bug) return curr;

      // Detach from DOM element if CSS bug
      if (CSS_BUG_VARIANTS.includes(bug.type)) {
        const page = pageRef.current;
        if (page) {
          const el = page.querySelector(`[data-bug-active="${id}"]`);
          if (el) {
            el.classList.remove('bug-drift', 'bug-comic', 'bug-invert', 'bug-chromatic');
            el.style.removeProperty('--dx');
            el.style.removeProperty('--dy');
            el.style.removeProperty('--r');
            el.style.transform = bug.originalTransform || '';
            delete el.dataset.bugActive;
            el.classList.add('fixed-flash');
            setTimeout(() => el.classList.remove('fixed-flash'), 500);
          }
        }
      }
      return curr.filter((b) => b.id !== id);
    });

    // Scoring with combo
    const now = Date.now();
    if (now - comboRef.current.lastFix < 1500) {
      comboRef.current.count += 1;
    } else {
      comboRef.current.count = 1;
    }
    comboRef.current.lastFix = now;

    const combo = comboRef.current.count;
    const base = 100;
    const bonus = combo > 1 ? (combo - 1) * 25 : 0;
    const total = base + bonus;
    setScore((s) => s + total);
    if (bx != null && by != null) {
      flashScore(bx, by, `+${total}`);
      burstConfetti(bx, by);
    }
    if (combo >= 3 && combo % 3 === 0) {
      setComboText(`x${combo} COMBO!`);
      sfx('combo');
      setTimeout(() => setComboText(''), 900);
    }
    sfx('fix');
  }, []);

  // =====================================================
  //  Click handlers by tool
  // =====================================================
  const tryClickBug = useCallback((e) => {
    if (screen !== 'playing') return;
    // Find whether click matches a bug matching current tool
    // Console popups and leaks handled via their own onClick. This handler
    // is mostly for drift bugs (drag) and for tapping screen with wrong tool (slight damage feedback).
  }, [screen]);

  const onConsoleClick = (bug, e) => {
    e.stopPropagation();
    if (tool !== 'debugger') {
      sfx('hit');
      return;
    }
    sfx('hit');
    if (bug.hp <= 1) {
      removeBug(bug.id, bug.x + 160, bug.y + 30);
    } else {
      setBugs((curr) => curr.map((b) => b.id === bug.id ? { ...b, hp: b.hp - 1 } : b));
    }
  };

  const onLeakInteract = (bug, e) => {
    e.stopPropagation();
    if (tool !== 'vacuum') return;
    sfx('vacuum');
    removeBug(bug.id, bug.x + 20, bug.y + 10);
  };

  // Drag-drop for drift bugs: listen on the page. When mousedown on an element with data-bug-active and tool is tape, grab it.
  useEffect(() => {
    if (screen !== 'playing') return;
    const onMouseDown = (e) => {
      if (tool !== 'tape') return;
      const el = e.target.closest('[data-bug-active]');
      if (!el) return;
      const id = Number(el.dataset.bugActive);
      draggingRef.current = { id, el, startX: e.clientX, startY: e.clientY };
      el.classList.add('dragging');
      // Pause drift animation — we'll translate manually
      el.style.animation = 'none';
      // Compute offset from original position using the standard DOMMatrix
      const computed = getComputedStyle(el).transform;
      let mx = 0, my = 0;
      if (computed && computed !== 'none') {
        try {
          const m = new DOMMatrixReadOnly(computed);
          mx = m.m41; my = m.m42;
        } catch (_) {}
      }
      draggingRef.current.offsetX = mx;
      draggingRef.current.offsetY = my;
      e.preventDefault();
    };
    const onMouseMove = (e) => {
      const d = draggingRef.current;
      if (!d) return;
      const dx = e.clientX - d.startX + d.offsetX;
      const dy = e.clientY - d.startY + d.offsetY;
      d.el.style.transform = `translate(${dx}px, ${dy}px)`;
      // Check how close we are to 0,0 (original placement)
      const dist = Math.hypot(dx, dy);
      if (dist < 40) {
        d.el.style.transform = 'translate(0,0)';
        // Snap & fix
        const rect = d.el.getBoundingClientRect();
        const bx = rect.left + rect.width / 2;
        const by = rect.top + rect.height / 2;
        d.el.classList.remove('dragging');
        draggingRef.current = null;
        removeBug(d.id, bx, by);
      }
    };
    const onMouseUp = () => {
      const d = draggingRef.current;
      if (!d) return;
      d.el.classList.remove('dragging');
      // Restore the drift animation (didn't fix)
      d.el.style.animation = '';
      draggingRef.current = null;
    };
    window.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    return () => {
      window.removeEventListener('mousedown', onMouseDown);
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
    };
  }, [screen, tool, removeBug]);

  // =====================================================
  //  Game loop (ticker + damage + wave progression)
  // =====================================================
  useEffect(() => {
    if (screen !== 'playing') return;
    startTimeRef.current = Date.now();

    gameTickRef.current = setInterval(() => {
      const now = Date.now();
      const secs = (now - startTimeRef.current) / 1000;
      setElapsed(secs);

      // Damage from active bugs
      setBugs((curr) => {
        if (curr.length === 0) return curr;
        const dmg = curr.reduce((sum, b) => sum + (BUG_TYPES[b.type]?.damagePerSec || 1), 0) * 0.1;
        setCrash((c) => Math.min(100, c + dmg));
        return curr;
      });

      // Wave progression
      const newWave = Math.floor(secs / 15) + 1;
      if (newWave !== waveRef.current) {
        waveRef.current = newWave;
        setWave(newWave);
        sfx('wave');
      }
    }, 100);

    return () => clearInterval(gameTickRef.current);
  }, [screen]);

  useEffect(() => {
    if (screen !== 'playing') return;

    const scheduleNext = () => {
      const w = waveRef.current;
      // Spawn interval shrinks with wave. W1: ~2.8s, W2: ~2.0s, W3: 1.4s, W4: 1.0s, then asymptotes.
      const base = Math.max(600, 3200 - w * 600);
      const jitter = Math.random() * 400;
      spawnTickRef.current = setTimeout(() => {
        spawnBug();
        // Occasionally double-spawn at higher waves
        if (w >= 3 && Math.random() < 0.25) setTimeout(spawnBug, 200);
        if (w >= 5 && Math.random() < 0.3) setTimeout(spawnBug, 400);
        scheduleNext();
      }, base + jitter);
    };
    scheduleNext();
    return () => clearTimeout(spawnTickRef.current);
  }, [screen, spawnBug]);

  // Crash check
  useEffect(() => {
    if (screen !== 'playing') return;
    if (crash >= 100) {
      sfx('crash');
      setScreen('over');
      setHighScore((h) => Math.max(h, score));
      setBestTime((b) => Math.max(b, elapsed));
    }
  }, [crash, screen, score, elapsed]);

  // =====================================================
  //  Start / restart
  // =====================================================
  const startGame = () => {
    // Clean up existing bugs from DOM
    const page = pageRef.current;
    if (page) {
      page.querySelectorAll('[data-bug-active]').forEach((el) => {
        el.classList.remove('bug-drift', 'bug-comic', 'bug-invert', 'bug-chromatic');
        el.style.transform = '';
        el.style.removeProperty('--dx');
        el.style.removeProperty('--dy');
        el.style.removeProperty('--r');
        delete el.dataset.bugActive;
      });
    }
    setBugs([]);
    setScore(0);
    setCrash(0);
    setElapsed(0);
    setWave(1);
    waveRef.current = 1;
    setTool('tape');
    comboRef.current = { count: 0, lastFix: 0 };
    getAudio(); // warm up audio context on user gesture
    setScreen('playing');
  };

  // ============================================================
  //  Render
  // ============================================================
  return (
    <>
      <LandingPage ref={pageRef} />

      {/* Scanline + CRT overlay only while playing */}
      {screen === 'playing' && <div className="scanline" />}

      {/* Bug overlays */}
      {screen === 'playing' && bugs.map((bug) => {
        if (bug.type === 'CONSOLE') {
          return (
            <div
              key={bug.id}
              className="console-popup"
              style={{ left: bug.x, top: bug.y, transform: `rotate(${bug.rot}deg)` }}
              onClick={(e) => onConsoleClick(bug, e)}
            >
              <div className="title">
                <span>⚠ Console Error</span>
                <span style={{ cursor: 'pointer' }}>✕</span>
              </div>
              <div className="body">
                {bug.message}
                {bug.maxHp > 1 && (
                  <div className="hp-bar">
                    <div className="hp-fill" style={{ width: `${(bug.hp / bug.maxHp) * 100}%` }} />
                  </div>
                )}
              </div>
            </div>
          );
        }
        if (bug.type === 'LEAK') {
          return (
            <div
              key={bug.id}
              className="memory-leak"
              style={{ left: bug.x, top: bug.y }}
              onMouseDown={(e) => onLeakInteract(bug, e)}
              onMouseEnter={(e) => { if (tool === 'vacuum') onLeakInteract(bug, e); }}
            >
              {bug.text}
            </div>
          );
        }
        return null; // CSS bugs are handled by modifying the DOM directly
      })}

      {/* Mark the actual DOM elements with data-bug-active to show them */}
      {screen === 'playing' && <ApplyCssBugMarkers bugs={bugs} pageRef={pageRef} />}

      {/* HUD */}
      {screen === 'playing' && (
        <HUD
          score={score}
          crash={crash}
          elapsed={elapsed}
          wave={wave}
          tool={tool}
          setTool={(t) => { setTool(t); sfx('tool'); }}
        />
      )}

      {/* Score flashes */}
      {flashes.map((f) => (
        <div key={f.id} className="floating-score" style={{ left: f.x, top: f.y, color: f.color }}>
          {f.amount}
        </div>
      ))}

      {/* Confetti */}
      {confetti.map((c) => (
        <div
          key={c.id}
          className="confetti-piece"
          style={{
            left: c.x, top: c.y,
            background: c.color,
            '--fx': `${c.fx}px`,
            '--fy': `${c.fy}px`,
          }}
        />
      ))}

      {/* Combo text */}
      {comboText && <div className="combo-flash">{comboText}</div>}

      {/* Start screen */}
      {screen === 'start' && <StartScreen onStart={startGame} highScore={highScore} bestTime={bestTime} />}

      {/* Game over screen */}
      {screen === 'over' && (
        <GameOverScreen
          score={score}
          elapsed={elapsed}
          wave={wave}
          highScore={highScore}
          bestTime={bestTime}
          onRestart={startGame}
        />
      )}
    </>
  );
}

// Marks DOM elements so drag handler can find them; keeps state-driven bug list aligned with DOM
function ApplyCssBugMarkers({ bugs, pageRef }) {
  // Nothing actually rendered — this effect keeps data-bug-active attribute in sync
  useEffect(() => {
    // The attribute is set when bug is spawned. Remove any stale attributes whose bug id is no longer in state.
    const page = pageRef.current;
    if (!page) return;
    const liveIds = new Set(bugs.map((b) => String(b.id)));
    page.querySelectorAll('[data-bug-active]').forEach((el) => {
      if (!liveIds.has(el.dataset.bugActive)) {
        el.classList.remove('bug-drift', 'bug-comic', 'bug-invert', 'bug-chromatic');
        el.style.transform = '';
        el.style.removeProperty('--dx');
        el.style.removeProperty('--dy');
        el.style.removeProperty('--r');
        delete el.dataset.bugActive;
      }
    });
  }, [bugs, pageRef]);
  return null;
}

      <div className="px-6 py-3 flex items-center justify-between gap-4 bg-slate-950/90 border-b border-slate-800 backdrop-blur-md pointer-events-auto">
        {/* Left: logo + score */}
        <div className="flex items-center gap-6">
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded-md bg-gradient-to-br from-violet-500 to-cyan-400 flex items-center justify-center font-black text-slate-900 text-sm">D</div>
            <span className="font-black tracking-tight">DOM DEFENDER</span>
          </div>
          <div className="flex items-center gap-5">
            <Stat label="Score" value={score.toLocaleString()} />
            <Stat label="Time"  value={`${Math.floor(elapsed)}s`} />
            <Stat label="Wave"  value={wave} valueClass="text-violet-300" />
          </div>
        </div>

        {/* Center: crash meter */}
        <div className="flex-1 max-w-xl">
          <div className="flex items-center justify-between mb-1">
            <span className={`neon-label ${danger ? 'text-red-400' : 'text-slate-400'}`}>Server Crash</span>
            <span className={`text-xs font-mono ${danger ? 'text-red-300' : 'text-slate-300'}`}>{Math.floor(crash)}%</span>
          </div>
          <div className="crash-meter-bg h-3 rounded-full">
            <div
              className={`crash-meter-fill h-full rounded-full ${danger ? 'danger' : ''}`}
              style={{ width: `${crash}%` }}
            />
          </div>
        </div>

        {/* Right: toolbar */}
        <div className="flex items-center gap-2">
          {Object.values(TOOLS).map((t) => (
            <button
              key={t.id}
              onClick={() => setTool(t.id)}
              className={`toolbar-btn px-3 py-2 rounded-lg border border-white/10 flex items-center gap-2 text-sm ${tool === t.id ? 'active text-white' : 'text-slate-300 bg-slate-900/60'}`}
              title={t.hint}
            >
              <span className="text-lg">{t.icon}</span>
              <span className="font-semibold hidden md:inline">{t.label}</span>
              <span className="neon-label bg-black/30 px-1.5 py-0.5 rounded">{t.key}</span>
            </button>
          ))}
        </div>
      </div>
      <div className="px-6 py-1 text-center text-xs text-slate-500 bg-slate-950/60 border-b border-slate-900/60">
        {TOOLS[tool.toUpperCase()]?.hint}
      </div>
    </div>
  );
}

function Stat({ label, value, valueClass = '' }) {
  return (
    <div className="flex flex-col items-start leading-tight">
      <span className="neon-label text-slate-500">{label}</span>
      <span className={`font-mono font-bold text-sm ${valueClass}`}>{value}</span>
    </div>
  );
}

            <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-violet-500 to-cyan-400 flex items-center justify-center font-black text-slate-900 text-2xl">D</div>
            <div>
              <div className="text-xs text-cyan-300 neon-label">404: Survival Found</div>

          <p className="text-slate-300 mt-4 mb-6 leading-relaxed">

          </p>
        </div>
      </div>
    </div>
  );
}

// ============================================================
//  Game Over Screen
// ============================================================
function GameOverScreen({ score, elapsed, wave, highScore, bestTime, onRestart }) {
  const beatScore = score > 0 && score >= highScore;
  const beatTime = elapsed > 0 && elapsed >= bestTime;
  return (
    <div className="overlay-modal">
      <div className="max-w-md w-full mx-6 bg-slate-950 border-2 border-red-500/50 rounded-3xl p-8 shadow-2xl relative overflow-hidden">
        <div className="absolute inset-x-0 top-0 bg-red-500 text-slate-950 font-black text-xs text-center py-1 tracking-widest overflow-hidden whitespace-nowrap">
          <span className="marquee">⚠ SERVER CRASH ⚠ ROLLBACK FAILED ⚠ ALL HANDS ON DECK ⚠ SERVER CRASH ⚠ </span>
        </div>

        <div className="mt-8">
          <div className="text-6xl mb-2 text-center">💥</div>
          <h2 className="text-3xl font-black text-center mb-1">SYSTEM DOWN</h2>
          <p className="text-slate-400 text-center text-sm mb-6">The server has crashed. Here's what you accomplished:</p>

          <div className="grid grid-cols-3 gap-3 mb-6">
            <ResultStat label="Score" value={score.toLocaleString()} highlight={beatScore} color="text-cyan-300" />
            <ResultStat label="Survived" value={`${Math.floor(elapsed)}s`} highlight={beatTime} color="text-violet-300" />
            <ResultStat label="Wave" value={wave} color="text-yellow-300" />
          </div>

          {(beatScore || beatTime) && (
            <div className="text-center mb-4 text-sm font-bold text-yellow-300 animate-pulse">
              {beatScore && beatTime ? '🏆 New best score AND longest run!' : beatScore ? '🏆 New high score!' : '🏆 New personal best time!'}
            </div>
          )}

          <button
            onClick={onRestart}
            className="w-full bg-gradient-to-r from-violet-500 to-cyan-400 text-slate-900 font-black text-lg py-3 rounded-xl hover:scale-[1.02] transition-transform"
          >
            RESTART SERVER ↻
          </button>
        </div>
      </div>
    </div>
  );
}

function ResultStat({ label, value, color = 'text-white', highlight }) {
  return (
    <div className={`glass rounded-xl p-3 text-center ${highlight ? 'ring-2 ring-yellow-400' : ''}`}>
      <div className="neon-label text-slate-500 mb-1">{label}</div>
      <div className={`font-mono font-black text-xl ${color}`}>{value}</div>
    </div>
  );
}

// ============================================================
//  Mount
// ============================================================
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
